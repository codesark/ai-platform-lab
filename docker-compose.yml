# Local dev stack. Bring up with:  make up   (or: docker compose up --build)
# Copy .env.example to .env first:  make setup
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres        # local dev only — not a real secret
      POSTGRES_DB: ai_platform
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./ingestion/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_platform"]
      interval: 5s
      timeout: 5s
      retries: 10

  ai-service:
    build: ./ai-service
    env_file:
      - path: .env
        required: false
    environment:
      # Override DB host for the compose network (service name "db").
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ai_platform
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
